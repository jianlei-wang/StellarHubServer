<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>文件服务</title>
  </head>
  <body>
    <input
      type="text"
      id="path"
      value="C:/"
      style="width: 100%; padding: 10px"
    />
    <div style="margin-top: 10px;">
      <button onclick="readDir()">读取目录</button>
      <button onclick="readText()">读取文本</button>
      <button onclick="openFile()">打开文件</button>
    </div>

    <div style="margin-top: 20px;">
      <label for="outputPath">输出目录（留空则同输入目录）：</label>
      <input
        type="text"
        id="outputDir"
        placeholder="例如：C:/temp/"
        style="width: 100%; padding: 10px; margin-top: 5px;"
      />
      <label for="dstCrs" style="margin-top: 10px; display: block;">目标坐标系（可选，如 EPSG:4326）：</label>
      <input
        type="text"
        id="dstCrs"
        placeholder="可选：EPSG:4326"
        style="width: 100%; padding: 10px; margin-top: 5px;"
      />
      
      <div style="display: flex; gap: 10px; margin-top: 10px;">
        <div style="flex: 1;">
          <label>压缩方式：</label>
          <select id="profile" style="width: 100%; padding: 5px;">
            <option value="deflate">deflate (推荐)</option>
            <option value="lzw">lzw</option>
            <option value="packbits">packbits</option>
            <option value="none">none</option>
          </select>
        </div>
        <div style="flex: 1;">
          <label>重采样：</label>
          <select id="resampling" style="width: 100%; padding: 5px;">
            <option value="bilinear">bilinear (双线性)</option>
            <option value="nearest">nearest (最近邻)</option>
            <option value="cubic">cubic (三次卷积)</option>
            <option value="lanczos">lanczos</option>
          </select>
        </div>
      </div>

      <div style="display: flex; gap: 10px; margin-top: 10px;">
        <div style="flex: 1;">
          <label>金字塔层级：</label>
          <input type="number" id="overviewLevel" value="6" style="width: 100%; padding: 5px;" />
        </div>
        <div style="flex: 1;">
          <label>瓦片大小：</label>
          <input type="number" id="blocksize" value="512" style="width: 100%; padding: 5px;" />
        </div>
      </div>

      <button style="margin-top: 15px; width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer;" onclick="convertCog()">转换为 COG</button>
    </div>

    <pre id="res"></pre>

    <script>
      const base = 'http://127.0.0.1:10086';
      
      async function readDir() {
        const path = document.getElementById('path').value;
        const r = await fetch(`${base}/api/read-dir?path=${encodeURIComponent(path)}`);
        const result = await r.json();
        document.getElementById('res').innerText = JSON.stringify(result, null, 2);
      }

      async function readText() {
        const path = document.getElementById('path').value;
        const r = await fetch(`${base}/api/read-text?path=${encodeURIComponent(path)}`);
        const result = await r.json();
        document.getElementById('res').innerText = JSON.stringify(result, null, 2);
      }

      function openFile() {
        const path = document.getElementById('path').value;
        window.open(`${base}/api/file?path=${encodeURIComponent(path)}`);
      }

      async function convertCog() {
        const filePath = document.getElementById('path').value;
        const outputDir = document.getElementById('outputDir').value;
        const dstCrs = document.getElementById('dstCrs').value;
        const profile = document.getElementById('profile').value;
        const resampling = document.getElementById('resampling').value;
        const overviewLevel = document.getElementById('overviewLevel').value;
        const blocksize = document.getElementById('blocksize').value;

        const formData = new FormData();
        formData.append('file_path', filePath);
        formData.append('output_dir', outputDir);
        formData.append('dst_crs', dstCrs);
        formData.append('profile', profile);
        formData.append('resampling', resampling);
        formData.append('overview_level', overviewLevel);
        formData.append('blocksize', blocksize);

        try {
          const r = await fetch(`${base}/cog/local/convert`, {
            method: 'POST',
            body: formData
          });

          const result = await r.json();
          document.getElementById('res').innerText = `任务已提交：\n${JSON.stringify(result, null, 2)}`;
          
          if (result.task_id) {
              // 自动轮询进度
              pollProgress(result.task_id);
          }
        } catch (e) {
          document.getElementById('res').innerText = `请求失败：${e.message}`;
        }
      }

      async function pollProgress(taskId) {
        const timer = setInterval(async () => {
          const r = await fetch(`${base}/cog/progress/${taskId}`);
          const task = await r.json();
          document.getElementById('res').innerText = `转换进度：\n${JSON.stringify(task, null, 2)}`;
          
          if (task.status === 'completed' || task.status === 'failed') {
            clearInterval(timer);
          }
        }, 2000);
      }
    </script>
  </body>
</html>
