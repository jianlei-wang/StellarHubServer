<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>文件服务</title>
  </head>
  <body>
    <input
      type="text"
      id="path"
      value="C:/"
      style="width: 100%; padding: 10px"
    />
    <div style="margin-top: 10px;">
      <button onclick="readDir()">读取目录</button>
      <button onclick="readText()">读取文本</button>
      <button onclick="openFile()">打开文件</button>
    </div>

    <div style="margin-top: 20px;">
      <label for="outputPath">输出 COG 路径（留空则自动生成）：</label>
      <input
        type="text"
        id="outputPath"
        placeholder="可选：C:/temp/output_cog.tif"
        style="width: 100%; padding: 10px; margin-top: 5px;"
      />
      <button style="margin-top: 10px;" onclick="convertCog()">转换为 COG</button>
    </div>

    <pre id="res"></pre>

    <script>
      const base = 'http://127.0.0.1:10086';
      async function readDir() {
        const r = await fetch(
          `${base}/api/read-dir?path=${encodeURIComponent(document.getElementById('path').value)}`,
        );
        document.getElementById('res').innerText = JSON.stringify(
          await r.json(),
          null,
          2,
        );
      }
      async function readText() {
        const r = await fetch(
          `${base}/api/read-text?path=${encodeURIComponent(document.getElementById('path').value)}`,
        );
        document.getElementById('res').innerText = JSON.stringify(
          await r.json(),
          null,
          2,
        );
      }
      function openFile() {
        window.open(
          `${base}/api/file?path=${encodeURIComponent(document.getElementById('path').value)}`,
        );
      }

      async function convertCog() {
        const input = document.getElementById('path').value;
        const output = document.getElementById('outputPath').value;
        const params = new URLSearchParams();
        params.append('input_path', input);
        if (output) {
          params.append('output_path', output);
        }

        const r = await fetch(`${base}/api/convert-cog?${params.toString()}`, {
          method: 'POST',
        });

        const result = await r.json();
        if (result.code === 200) {
          document.getElementById('res').innerHTML =
            `转换成功：\n${JSON.stringify(result, null, 2)}`;
        } else {
          document.getElementById('res').innerHTML =
            `转换失败：\n${JSON.stringify(result, null, 2)}`;
        }
      }
    </script>
  </body>
</html>
